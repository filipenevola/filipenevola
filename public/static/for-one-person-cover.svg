<svg width="680" height="1000" viewBox="0 0 680 1000" xmlns="http://www.w3.org/2000/svg" role="img">
<title>For One Person — Filipe Névola</title>
<desc>A single orange ball on a deep navy cover, with the title For One Person, a subtitle about mental models, and the author name.</desc>
<rect x="0" y="0" width="680" height="1000" rx="18" fill="#0e1730"/>
<rect x="14" y="14" width="652" height="972" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
<circle cx="340" cy="306" r="126" fill="none" stroke="rgba(243,164,78,0.16)" stroke-width="2"/>
<circle cx="340" cy="306" r="94" fill="#e8772e"/>
<circle cx="312" cy="276" r="34" fill="#f6b27a" opacity="0.85"/>
<circle cx="304" cy="266" r="12" fill="#ffe0c2" opacity="0.85"/>
<text x="340" y="540" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="500" fill="#f8fafc">For One</text>
<text x="340" y="636" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="500" fill="#f8fafc">Person</text>
<text x="340" y="712" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#93a4bd">The mental models I use to build, decide,</text>
<text x="340" y="746" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#93a4bd">lead, live, and protect what matters,</text>
<text x="340" y="780" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#93a4bd">so you can build your own.</text>
<line x1="296" y1="828" x2="384" y2="828" stroke="rgba(148,163,184,0.35)" stroke-width="1"/>
<text x="340" y="912" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="500" fill="#d8e0ec">Filipe Névola</text>
</svg>
